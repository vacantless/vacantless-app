name: Showing reminders sweep

# Free external pinger for the M3 reminder cron. Vercel Hobby caps native cron
# at once/day, which can't drive the ~2h reminder, so this GitHub Actions
# schedule hits the idempotent sweep endpoint every 15 minutes. The route only
# sends reminders whose sent-at column is still null, so frequent pings are
# safe and compose with the daily Vercel cron.
#
# SETUP (one-time, Noam):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository
#   secret → name CRON_SECRET, value = the same CRON_SECRET set in Vercel env.
#
# Note: GitHub-scheduled runs can be delayed under load and are auto-disabled
# after 60 days with no repo commits — fine for an active repo. When Vacantless
# takes its first external paying customer, move to Vercel Pro native cron
# (*/15 * * * * in vercel.json) and delete this workflow.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger a sweep manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/reminders" \
            -w "\nHTTP %{http_code}\n"
