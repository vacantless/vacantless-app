name: Vacantless background sweeps

# Free external pinger for the Vacantless cron sweeps. Vercel Hobby caps native
# cron at once/day, which can't drive the ~2h reminder, so this GitHub Actions
# schedule hits the idempotent sweep endpoints every 15 minutes. Each route only
# acts on rows whose sent-at column is still null, so frequent pings are safe
# and compose with the daily Vercel cron.
#
#   * /api/cron/reminders — 24h + 2h showing reminders (M3)
#   * /api/cron/feedback  — post-showing feedback requests (M5)
#   * /api/cron/nurture   — lead nurture drip to un-booked inquiries (M5)
#   * /api/cron/leasing-snapshot — daily weekday leasing digest (self-gates to
#     once/day at the org's start-of-shift hour via leasing_snapshot_last_sent_on)
#   * /api/cron/rent-increase — per-tenancy N1 reminder (self-gates to once per
#     increase cycle via tenancies.rent_increase_nudged_for)
#   * /api/cron/compliance-calendar — seasonal soft tenant courtesy notes (drafts
#     into pending_tenant_messages on the season window; opt-in per org+event,
#     self-gates to once/season via the pending_tenant_messages dedupe index)
#   * /api/cron/document-retention — permanently purges soft-deleted vault
#     documents past their retention window (documents.retention_until); acts only
#     on already soft-deleted rows, so frequent pings are safe
#
# SETUP (one-time, Noam):
#   GitHub repo → Settings → Secrets and variables → Actions → New repository
#   secret → name CRON_SECRET, value = the same CRON_SECRET set in Vercel env.
#
# Note: GitHub-scheduled runs can be delayed under load and are auto-disabled
# after 60 days with no repo commits — fine for an active repo. When Vacantless
# takes its first external paying customer, move to Vercel Pro native cron
# (*/15 * * * * in vercel.json) and delete this workflow.

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch: {} # lets you trigger the sweeps manually from the Actions tab

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger reminder sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/reminders" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger feedback sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/feedback" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger nurture sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/nurture" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger leasing-snapshot sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/leasing-snapshot" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger rent-increase sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/rent-increase" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger compliance-calendar sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/compliance-calendar" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger document-retention purge
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/document-retention" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger detector-eol sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/detector-eol" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger equipment-eol sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/equipment-eol" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger appliance-care sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/appliance-care" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger tenancy-insurance sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/tenancy-insurance" \
            -w "\nHTTP %{http_code}\n"
      - name: Trigger violation-followup sweep
        run: |
          curl -sS -X GET \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "https://vacantless-app.vercel.app/api/cron/violation-followup" \
            -w "\nHTTP %{http_code}\n"
